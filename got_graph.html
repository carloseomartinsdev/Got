<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoT - Grafo de Relações</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.8); color: #fff;
            padding: 15px; border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            max-width: 300px;
        }
        #info img {
            width: 100%; border-radius: 5px; margin-bottom: 10px;
        }
        #info h2 { font-size: 18px; margin-bottom: 5px; }
        #info p { font-size: 14px; color: #ccc; margin: 3px 0; }
        #info button { 
            margin-top: 10px; padding: 8px 15px; 
            background: #4a90e2; border: none; 
            border-radius: 5px; color: #fff; 
            cursor: pointer; font-size: 12px;
        }
        #info button:hover { background: #357abd; }
        #controls {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px; border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 12px;
        }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-size: 24px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="loading">Carregando dados...</div>
    <div id="info" style="display:none;">
        <img id="charPhoto" src="" alt="" onerror="this.style.display='none'">
        <h2 id="charName"></h2>
        <p id="charFalas"></p>
        <p id="charRelacoes"></p>
        <button id="filterBtn">Filtrar Relações</button>
    </div>
    <div id="controls" style="display:none;">
        🖱️ Arraste para girar | 🔍 Scroll para zoom | Shift+Scroll para mover câmera | <span id="charCount"></span>
    </div>
    <script src="got_data_embed.js"></script>
    <script src="got_graph.js"></script>
</body>
</html>
